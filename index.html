<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Projeto Login Autoral</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
</head>

<body>
    <main id="login">
        <form class="form">
            <h1>Acessar</h1>
            <label>E-mail</label>

            <label>Senha</label>
            <input type="password" name="" id="" placeholder="Informe a sua senha">
            <button>Entrar</button>           
        </form>
    </main>
</body>

</html>
